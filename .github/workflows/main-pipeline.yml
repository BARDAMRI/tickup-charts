name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
publish:
  runs-on: ubuntu-latest
  permissions:
    contents: read
    id-token: write

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.14.0
        registry-url: https://registry.npmjs.org

    - name: Show Node and npm versions
      run: |
        node -v
        npm -v

    - name: Upgrade npm
      run: npm install -g npm@latest

    - name: Show npm version after upgrade
      run: npm -v

    - name: Install dependencies
      run: npm ci

    - name: Publish to NPM
      run: npm publish --access public --provenance
      
  deploy:
    needs: [publish]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Create Mock Prime for CI
        run: |
          mkdir -p ../tickup-prime-final
          echo '{"name": "@tickup/prime", "version": "1.0.0", "main": "index.js", "types": "index.d.ts"}' > ../tickup-prime-final/package.json
          echo "export const TickUpPrime = null; export const createTickUpPrimeEngine = (t) => null; export const getTickUpPrimeThemePatch = (t) => ({});" > ../tickup-prime-final/index.js
          echo "export declare const TickUpPrime: any; export declare const createTickUpPrimeEngine: (t: any) => any; export declare const getTickUpPrimeThemePatch: (t: any) => any;" > ../tickup-prime-final/index.d.ts

      - name: Install dependencies (Root & Example)
        run: |
          npm ci
          cd example && npm ci

      - name: Build Core and Showcase
        run: |
          npm run build
          cd example && npm run build

      - name: Add SPA fallback page
        run: cp example/dist/index.html example/dist/404.html

      - name: Deploy Showcase to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./example/dist
          publish_branch: gh-pages

      - name: Trigger Prime Repository Sync
        if: success()
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GH_PAT }}" \
          https://api.github.com/repos/BARDAMRI/tickup-prime/dispatches \
          -d '{"event_type": "core_updated"}'