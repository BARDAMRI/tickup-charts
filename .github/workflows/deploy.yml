name: Deploy Showcase to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Create Mock Prime for CI
        run: |
          mkdir -p ../tickup-prime-final
          echo '{"name": "@tickup/prime", "version": "1.0.0", "main": "index.js", "types": "index.d.ts"}' > ../tickup-prime-final/package.json
          echo "export const TickUpPrime = null; export const createTickUpPrimeEngine = (t) => null; export const getTickUpPrimeThemePatch = (t) => ({});" > ../tickup-prime-final/index.js
          echo "export declare const TickUpPrime: any; export declare const createTickUpPrimeEngine: (t: any) => any; export declare const getTickUpPrimeThemePatch: (t: any) => any;" > ../tickup-prime-final/index.d.ts

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm ci
        working-directory: example

      - name: Build core library
        run: npm run build

      - name: Build example
        run: npm run build
        working-directory: example

      - name: Add SPA fallback page
        run: cp dist/index.html dist/404.html
        working-directory: example

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./example/dist
          publish_branch: gh-pages
