name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci 

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push
        run: |
          npm version patch -m "chore: release v%s [skip ci]" --force
          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish to NPM
        run: |
          npm run build
          # הוספת --provenance מחברת את החבילה למקור שלה בגיטהאב
          npm publish --access public --provenance 

  deploy:
    needs: [publish]
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (latest main with new version)
        uses: actions/checkout@v4
        with:
          ref: main 
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Create Mock Prime for CI
        run: |
          mkdir -p ../tickup-prime-final
          echo '{"name": "@tickup/prime", "version": "1.0.0", "main": "index.js", "types": "index.d.ts"}' > ../tickup-prime-final/package.json
          echo "export const TickUpPrime = null; export const createTickUpPrimeEngine = (t) => null; export const getTickUpPrimeThemePatch = (t) => ({});" > ../tickup-prime-final/index.js
          echo "export declare const TickUpPrime: any; export declare const createTickUpPrimeEngine: (t: any) => any; export declare const getTickUpPrimeThemePatch: (t: any) => any;" > ../tickup-prime-final/index.d.ts

      - name: Install dependencies (Root & Example)
        run: |
          npm ci
          cd example && npm ci

      - name: Build Core and Showcase
        run: |
          npm run build
          cd example && npm run build

      - name: Add SPA fallback page
        run: cp example/dist/index.html example/dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./example/dist
          publish_branch: gh-pages
          
      - name: Trigger Prime Update
        if: success()
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GH_PAT }}" \
          https://api.github.com/repos/BARDAMRI/tickup-prime/dispatches \
          -d '{"event_type": "core_updated"}'
