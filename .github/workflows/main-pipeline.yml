name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Show npm version after upgrade
        run: npm -v

      - name: Install dependencies
        run: npm ci

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (patch)
        id: bump
        run: |
          npm version patch -m "chore: bump version to %s [skip ci]"
          echo "publish_version=$(npm pkg get version | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Verify publish is newer than registry (anti-rollback)
        run: |
          npm install --no-save semver@7
          REG="$(npm view tickup version 2>/dev/null || true)"
          NEW="$(node -p "require('./package.json').version")"
          echo "Registry latest: ${REG:-<none>}"
          echo "Publishing: $NEW"
          node -e "const semver=require('semver');const reg=process.argv[1]||'';const neu=process.argv[2];if(!semver.gte(neu,'1.0.36')){console.error('Blocked: publish version',neu,'must be >= 1.0.36 (Generous Standard baseline)');process.exit(1)}if(!reg){console.log('No existing version on registry; ok');process.exit(0)}if(!semver.gt(neu,reg)){console.error('Blocked: rollback —',neu,'is not strictly greater than npm latest',reg);process.exit(1)}console.log('ok:',neu,'>',reg)" "$REG" "$NEW"

      - name: Push version bump commit/tag
        run: git push --follow-tags

      - name: Publish to NPM
        run: npm publish --access public --provenance --tag latest

  deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    needs: [ publish ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Create Mock Prime for CI
        run: |
          mkdir -p ../tickup-prime-final/dist
          echo '{"name": "@tickup/prime", "version": "1.0.0", "main": "index.js", "module": "index.js", "types": "index.d.ts", "exports": {".": {"import": "./index.js", "require": "./index.js", "types": "./index.d.ts"}}}' > ../tickup-prime-final/dist/package.json
          echo "export const TickUpPrime = null; export const createTickUpPrimeEngine = (t) => null; export const getTickUpPrimeThemePatch = (t) => ({}); export const validateLicense = async () => false;" > ../tickup-prime-final/dist/index.js
          echo "export declare const TickUpPrime: any; export declare const createTickUpPrimeEngine: (t: any) => any; export declare const getTickUpPrimeThemePatch: (t: any) => any; export declare const validateLicense: (key?: string | null, userIdentifier?: string | null) => Promise<boolean>;" > ../tickup-prime-final/dist/index.d.ts

      - name: Install dependencies (Root & Example)
        run: |
          npm ci
          cd example && npm ci

      - name: Build Core and Showcase
        run: |
          npm run build
          cd example && npm run build:prime

      - name: Add SPA fallback page
        run: cp example/dist/index.html example/dist/404.html

      - name: Deploy Showcase to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./example/dist
          publish_branch: gh-pages

      - name: Trigger Prime Repository Sync
        if: success()
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GH_PAT }}" \
          https://api.github.com/repos/BARDAMRI/tickup-prime/dispatches \
          -d '{"event_type": "core_updated"}'