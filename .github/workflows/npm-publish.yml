name: NPM Publish
on:
  push:
    branches: [main]
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run build
      - name: Publish to NPM
        run: npm publish --access public
        continue-on-error: true # Prevents workflow failure if version isn't bumped
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
